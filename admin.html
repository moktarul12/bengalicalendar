<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bengali Calendar Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2.5em;
        }
        .form-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        .form-section h2 {
            color: #555;
            margin-bottom: 20px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        button {
            background: #667eea;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 10px;
            transition: background 0.3s;
        }
        button:hover {
            background: #5568d3;
        }
        button.delete {
            background: #e74c3c;
        }
        button.delete:hover {
            background: #c0392b;
        }
        button.edit {
            background: #f39c12;
        }
        button.edit:hover {
            background: #e67e22;
        }
        .events-section {
            margin-top: 30px;
        }
        .events-section h2 {
            color: #555;
            margin-bottom: 20px;
        }
        .events-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .events-table th,
        .events-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        .events-table th {
            background: #667eea;
            color: white;
            font-weight: 500;
        }
        .events-table tr:hover {
            background: #f8f9fa;
        }
        .filter-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .color-preview {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: inline-block;
            vertical-align: middle;
            margin-left: 10px;
        }
        .event-image {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 5px;
        }
        .description-preview {
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        .modal-content {
            background: white;
            max-width: 800px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 10px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .close {
            float: right;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }
        .close:hover {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🇧🇩 Bengali Calendar Admin Panel</h1>
        
        <div class="filter-section">
            <h2>Filter Events</h2>
            <div class="filter-grid">
                <div class="form-group">
                    <label>Month:</label>
                    <select id="filterMonth">
                        <option value="">All Months</option>
                        <option value="1">January</option>
                        <option value="2">February</option>
                        <option value="3">March</option>
                        <option value="4">April</option>
                        <option value="5">May</option>
                        <option value="6">June</option>
                        <option value="7">July</option>
                        <option value="8">August</option>
                        <option value="9">September</option>
                        <option value="10">October</option>
                        <option value="11">November</option>
                        <option value="12">December</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Type:</label>
                    <select id="filterType">
                        <option value="">All Types</option>
                        <option value="historical">Historical</option>
                        <option value="cultural">Cultural</option>
                        <option value="national">National</option>
                        <option value="religious">Religious</option>
                        <option value="person">Person</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Search:</label>
                    <input type="text" id="searchInput" placeholder="Search by title...">
                </div>
                <div class="form-group">
                    <label>&nbsp;</label>
                    <button onclick="loadEvents()">Apply Filters</button>
                </div>
            </div>
        </div>

        <div class="form-section">
            <h2>Add New Event</h2>
            <form id="eventForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>ID:</label>
                        <input type="text" id="eventId" required>
                    </div>
                    <div class="form-group">
                        <label>Day:</label>
                        <input type="number" id="eventDay" min="1" max="31" required>
                    </div>
                    <div class="form-group">
                        <label>Month:</label>
                        <select id="eventMonth" required>
                            <option value="1">January</option>
                            <option value="2">February</option>
                            <option value="3">March</option>
                            <option value="4">April</option>
                            <option value="5">May</option>
                            <option value="6">June</option>
                            <option value="7">July</option>
                            <option value="8">August</option>
                            <option value="9">September</option>
                            <option value="10">October</option>
                            <option value="11">November</option>
                            <option value="12">December</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Year:</label>
                        <input type="number" id="eventYear" value="0">
                    </div>
                    <div class="form-group">
                        <label>Title (Bengali):</label>
                        <input type="text" id="titleBn" required>
                    </div>
                    <div class="form-group">
                        <label>Title (English):</label>
                        <input type="text" id="titleEn" required>
                    </div>
                    <div class="form-group">
                        <label>Type:</label>
                        <select id="eventType" required>
                            <option value="historical">Historical</option>
                            <option value="cultural">Cultural</option>
                            <option value="national">National</option>
                            <option value="religious">Religious</option>
                            <option value="person">Person</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Color:</label>
                        <input type="color" id="eventColor" value="#1E3A5F">
                    </div>
                    <div class="form-group">
                        <label>Image URL:</label>
                        <input type="url" id="imageUrl" placeholder="https://...">
                    </div>
                </div>
                <div class="form-group">
                    <label>Description (Bengali):</label>
                    <textarea id="descriptionBn" required></textarea>
                </div>
                <div class="form-group">
                    <label>Description (English):</label>
                    <textarea id="descriptionEn" required></textarea>
                </div>
                <button type="submit">Add Event</button>
                <button type="button" onclick="clearForm()">Clear Form</button>
            </form>
        </div>

        <div class="events-section">
            <h2>Events List</h2>
            <table class="events-table">
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>ID</th>
                        <th>Date</th>
                        <th>Title (Bengali)</th>
                        <th>Title (English)</th>
                        <th>Type</th>
                        <th>Color</th>
                        <th>Description (EN)</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="eventsTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>Edit Event</h2>
            <form id="editForm">
                <input type="hidden" id="editOriginalId">
                <div class="form-grid">
                    <div class="form-group">
                        <label>ID:</label>
                        <input type="text" id="editId" required>
                    </div>
                    <div class="form-group">
                        <label>Day:</label>
                        <input type="number" id="editDay" min="1" max="31" required>
                    </div>
                    <div class="form-group">
                        <label>Month:</label>
                        <select id="editMonth" required>
                            <option value="1">January</option>
                            <option value="2">February</option>
                            <option value="3">March</option>
                            <option value="4">April</option>
                            <option value="5">May</option>
                            <option value="6">June</option>
                            <option value="7">July</option>
                            <option value="8">August</option>
                            <option value="9">September</option>
                            <option value="10">October</option>
                            <option value="11">November</option>
                            <option value="12">December</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Year:</label>
                        <input type="number" id="editYear" value="0">
                    </div>
                    <div class="form-group">
                        <label>Title (Bengali):</label>
                        <input type="text" id="editTitleBn" required>
                    </div>
                    <div class="form-group">
                        <label>Title (English):</label>
                        <input type="text" id="editTitleEn" required>
                    </div>
                    <div class="form-group">
                        <label>Type:</label>
                        <select id="editType" required>
                            <option value="historical">Historical</option>
                            <option value="cultural">Cultural</option>
                            <option value="national">National</option>
                            <option value="religious">Religious</option>
                            <option value="person">Person</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Color:</label>
                        <input type="color" id="editColor" value="#1E3A5F">
                    </div>
                    <div class="form-group">
                        <label>Image URL:</label>
                        <input type="url" id="editImageUrl" placeholder="https://...">
                    </div>
                </div>
                <div class="form-group">
                    <label>Description (Bengali):</label>
                    <textarea id="editDescriptionBn" required></textarea>
                </div>
                <div class="form-group">
                    <label>Description (English):</label>
                    <textarea id="editDescriptionEn" required></textarea>
                </div>
                <button type="submit">Update Event</button>
                <button type="button" onclick="closeModal()">Cancel</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'http://104.248.202.152:3000/api/events';
        let allEvents = [];

        // Load events on page load
        document.addEventListener('DOMContentLoaded', loadEvents);

        // Add event form submission
        document.getElementById('eventForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const eventData = {
                id: document.getElementById('eventId').value,
                day: parseInt(document.getElementById('eventDay').value),
                month: parseInt(document.getElementById('eventMonth').value),
                year: parseInt(document.getElementById('eventYear').value) || 0,
                titleBn: document.getElementById('titleBn').value,
                titleEn: document.getElementById('titleEn').value,
                type: document.getElementById('eventType').value,
                color: document.getElementById('eventColor').value,
                descriptionBn: document.getElementById('descriptionBn').value,
                descriptionEn: document.getElementById('descriptionEn').value,
                imageUrl: document.getElementById('imageUrl').value
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(eventData)
                });
                if (response.ok) {
                    alert('Event added successfully!');
                    clearForm();
                    loadEvents();
                } else {
                    alert('Error adding event');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        });

        // Edit event form submission
        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const originalId = document.getElementById('editOriginalId').value;
            const eventData = {
                id: document.getElementById('editId').value,
                day: parseInt(document.getElementById('editDay').value),
                month: parseInt(document.getElementById('editMonth').value),
                year: parseInt(document.getElementById('editYear').value) || 0,
                titleBn: document.getElementById('editTitleBn').value,
                titleEn: document.getElementById('editTitleEn').value,
                type: document.getElementById('editType').value,
                color: document.getElementById('editColor').value,
                descriptionBn: document.getElementById('editDescriptionBn').value,
                descriptionEn: document.getElementById('editDescriptionEn').value,
                imageUrl: document.getElementById('editImageUrl').value
            };

            try {
                const response = await fetch(`${API_URL}/${originalId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(eventData)
                });
                if (response.ok) {
                    alert('Event updated successfully!');
                    closeModal();
                    loadEvents();
                } else {
                    alert('Error updating event');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        });

        async function loadEvents() {
            try {
                const response = await fetch(API_URL);
                allEvents = await response.json();
                applyFilters();
            } catch (error) {
                alert('Error loading events: ' + error.message);
            }
        }

        function applyFilters() {
            const month = document.getElementById('filterMonth').value;
            const type = document.getElementById('filterType').value;
            const search = document.getElementById('searchInput').value.toLowerCase();

            let filtered = allEvents;

            if (month) {
                filtered = filtered.filter(e => e.month === parseInt(month));
            }
            if (type) {
                filtered = filtered.filter(e => e.type === type);
            }
            if (search) {
                filtered = filtered.filter(e => 
                    e.titleEn.toLowerCase().includes(search) || 
                    e.titleBn.includes(search)
                );
            }

            displayEvents(filtered);
        }

        function displayEvents(events) {
            const tbody = document.getElementById('eventsTableBody');
            tbody.innerHTML = '';

            events.forEach(event => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><img src="${event.imageUrl || 'https://via.placeholder.com/50'}" class="event-image" alt="Event"></td>
                    <td>${event.id}</td>
                    <td>${event.day}/${event.month}/${event.year || 'N/A'}</td>
                    <td>${event.titleBn}</td>
                    <td>${event.titleEn}</td>
                    <td>${event.type}</td>
                    <td><span class="color-preview" style="background-color: ${event.color}"></span></td>
                    <td class="description-preview">${event.descriptionEn}</td>
                    <td>
                        <button class="edit" onclick="editEvent('${event.id}')">Edit</button>
                        <button class="delete" onclick="deleteEvent('${event.id}')">Delete</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        async function deleteEvent(id) {
            if (confirm('Are you sure you want to delete this event?')) {
                try {
                    const response = await fetch(`${API_URL}/${id}`, {
                        method: 'DELETE'
                    });
                    if (response.ok) {
                        alert('Event deleted successfully!');
                        loadEvents();
                    } else {
                        alert('Error deleting event');
                    }
                } catch (error) {
                    alert('Error: ' + error.message);
                }
            }
        }

        function editEvent(id) {
            const event = allEvents.find(e => e.id === id);
            if (event) {
                document.getElementById('editOriginalId').value = event.id;
                document.getElementById('editId').value = event.id;
                document.getElementById('editDay').value = event.day;
                document.getElementById('editMonth').value = event.month;
                document.getElementById('editYear').value = event.year;
                document.getElementById('editTitleBn').value = event.titleBn;
                document.getElementById('editTitleEn').value = event.titleEn;
                document.getElementById('editType').value = event.type;
                document.getElementById('editColor').value = event.color;
                document.getElementById('editImageUrl').value = event.imageUrl || '';
                document.getElementById('editDescriptionBn').value = event.descriptionBn;
                document.getElementById('editDescriptionEn').value = event.descriptionEn;
                document.getElementById('editModal').style.display = 'block';
            }
        }

        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        function clearForm() {
            document.getElementById('eventForm').reset();
            document.getElementById('eventColor').value = '#1E3A5F';
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('editModal');
            if (event.target === modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
