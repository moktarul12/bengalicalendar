<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bengali Calendar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2.5em;
        }
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .calendar-header h2 {
            color: #555;
            font-size: 1.8em;
        }
        .nav-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        .nav-btn:hover {
            background: #5568d3;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }
        .day-header {
            background: #667eea;
            color: white;
            padding: 15px;
            text-align: center;
            border-radius: 5px;
            font-weight: bold;
        }
        .day-cell {
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 10px;
            min-height: 100px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        .day-cell:hover {
            background: #e9ecef;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .day-cell.has-event {
            border-left: 4px solid #667eea;
        }
        .day-cell.has-festival {
            border-left: 4px solid #FFD700;
        }
        .day-number {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        .event-indicator {
            font-size: 0.8em;
            color: #667eea;
            margin-bottom: 2px;
        }
        .festival-indicator {
            font-size: 0.8em;
            color: #D4A017;
            margin-bottom: 2px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        .modal-content {
            background: white;
            max-width: 900px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 10px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .close {
            float: right;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }
        .close:hover {
            color: #333;
        }
        .modal-header {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #667eea;
        }
        .modal-header h3 {
            color: #333;
            font-size: 1.8em;
        }
        .section-title {
            color: #667eea;
            font-size: 1.3em;
            margin: 20px 0 15px 0;
            padding-bottom: 10px;
            border-bottom: 1px solid #ddd;
        }
        .event-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }
        .festival-card {
            background: #fff8e1;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #FFD700;
        }
        .event-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        .event-type {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.8em;
            color: white;
            margin-bottom: 10px;
        }
        .event-description {
            color: #555;
            line-height: 1.6;
            margin-bottom: 10px;
        }
        .event-image {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 5px;
            margin-top: 10px;
        }
        .empty-state {
            text-align: center;
            color: #999;
            padding: 30px;
        }
        .bengali-month {
            color: #667eea;
            font-size: 1.5em;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🇧🇩 Bengali Calendar</h1>
        
        <div class="calendar-header">
            <button class="nav-btn" onclick="previousMonth()">← Previous</button>
            <div>
                <h2 id="currentMonth"></h2>
                <div class="bengali-month" id="bengaliMonth"></div>
            </div>
            <button class="nav-btn" onclick="nextMonth()">Next →</button>
        </div>

        <div class="calendar-grid">
            <div class="day-header">Sun</div>
            <div class="day-header">Mon</div>
            <div class="day-header">Tue</div>
            <div class="day-header">Wed</div>
            <div class="day-header">Thu</div>
            <div class="day-header">Fri</div>
            <div class="day-header">Sat</div>
        </div>

        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div id="eventModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div class="modal-header">
                <h3 id="modalDate"></h3>
            </div>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://104.248.202.152:3000/api';
        let currentDate = new Date();
        let eventsData = [];
        let festivalsData = [];

        const bengaliMonths = ['বৈশাখ', 'জ্যৈষ্ঠ', 'আষাঢ়', 'শ্রাবণ', 'ভাদ্র', 'আশ্বিন', 'কার্তিক', 'অগ্রহায়ণ', 'পৌষ', 'মাঘ', 'ফাল্গুন', 'চৈত্র'];
        const englishMonths = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

        document.addEventListener('DOMContentLoaded', () => {
            loadCalendar();
        });

        async function loadCalendar() {
            try {
                const [eventsRes, festivalsRes] = await Promise.all([
                    fetch(`${API_URL}/events`),
                    fetch(`${API_URL}/festivals`)
                ]);
                eventsData = await eventsRes.json();
                festivalsData = await festivalsRes.json();
                renderCalendar();
            } catch (error) {
                console.error('Error loading data:', error);
            }
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            document.getElementById('currentMonth').textContent = `${englishMonths[month]} ${year}`;
            document.getElementById('bengaliMonth').textContent = bengaliMonths[month];

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            // Empty cells for days before the first day of the month
            for (let i = 0; i < firstDay; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'day-cell';
                emptyCell.style.background = '#e9ecef';
                emptyCell.style.cursor = 'default';
                grid.appendChild(emptyCell);
            }

            // Days of the month
            for (let day = 1; day <= daysInMonth; day++) {
                const dayCell = document.createElement('div');
                dayCell.className = 'day-cell';
                
                const dayEvents = eventsData.filter(e => e.day === day && e.month === month + 1);
                const dayFestivals = festivalsData.filter(f => f.day === day && f.month === month + 1);
                
                if (dayEvents.length > 0) {
                    dayCell.classList.add('has-event');
                }
                if (dayFestivals.length > 0) {
                    dayCell.classList.add('has-festival');
                }

                let html = `<div class="day-number">${day}</div>`;
                
                dayEvents.slice(0, 2).forEach(event => {
                    html += `<div class="event-indicator">• ${event.titleEn.substring(0, 15)}...</div>`;
                });
                
                dayFestivals.slice(0, 2).forEach(festival => {
                    html += `<div class="festival-indicator">★ ${festival.titleEn.substring(0, 15)}...</div>`;
                });

                if (dayEvents.length > 2 || dayFestivals.length > 2) {
                    html += `<div style="font-size: 0.7em; color: #999;">+${dayEvents.length + dayFestivals.length - 2} more</div>`;
                }

                dayCell.innerHTML = html;
                dayCell.onclick = () => showDayDetails(day, month + 1, year);
                grid.appendChild(dayCell);
            }
        }

        async function showDayDetails(day, month, year) {
            console.log('showDayDetails called:', day, month, year);
            try {
                const url = `${API_URL}/date/${day}/${month}`;
                console.log('Fetching from:', url);
                const response = await fetch(url);
                console.log('Response status:', response.status);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                console.log('Data received:', data);
                
                document.getElementById('modalDate').textContent = `${englishMonths[month - 1]} ${day}, ${year}`;
                
                let content = '';
                
                if (data.events.length > 0) {
                    content += '<div class="section-title">📅 Events</div>';
                    data.events.forEach(event => {
                        content += `
                            <div class="event-card">
                                <div class="event-title">${event.titleEn}</div>
                                <div class="event-title" style="font-size: 1em; color: #667eea;">${event.titleBn}</div>
                                <span class="event-type" style="background: ${event.color}">${event.type}</span>
                                <div class="event-description">${event.descriptionEn}</div>
                                <div class="event-description" style="color: #666;">${event.descriptionBn}</div>
                                ${event.imageUrl ? `<img src="${event.imageUrl}" class="event-image" alt="${event.titleEn}">` : ''}
                            </div>
                        `;
                    });
                } else {
                    content += '<div class="section-title">📅 Events</div>';
                    content += '<div class="empty-state">No events on this day</div>';
                }
                
                if (data.festivals.length > 0) {
                    content += '<div class="section-title">🎉 Festivals</div>';
                    data.festivals.forEach(festival => {
                        content += `
                            <div class="festival-card">
                                <div class="event-title">${festival.titleEn}</div>
                                <div class="event-title" style="font-size: 1em; color: #D4A017;">${festival.titleBn}</div>
                                <span class="event-type" style="background: ${festival.color}">${festival.type}</span>
                                <div class="event-description">${festival.descriptionEn}</div>
                                <div class="event-description" style="color: #666;">${festival.descriptionBn}</div>
                                ${festival.imageUrl ? `<img src="${festival.imageUrl}" class="event-image" alt="${festival.titleEn}">` : ''}
                            </div>
                        `;
                    });
                } else {
                    content += '<div class="section-title">🎉 Festivals</div>';
                    content += '<div class="empty-state">No festivals on this day</div>';
                }
                
                document.getElementById('modalContent').innerHTML = content;
                document.getElementById('eventModal').style.display = 'block';
            } catch (error) {
                console.error('Error loading day details:', error);
            }
        }

        function previousMonth() {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        }

        function nextMonth() {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        }

        function closeModal() {
            document.getElementById('eventModal').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('eventModal');
            if (event.target === modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
