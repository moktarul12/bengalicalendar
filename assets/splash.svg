<svg width="1284" height="2778" viewBox="0 0 1284 2778" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="splashGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E63946"/>
      <stop offset="50%" style="stop-color:#F77F00"/>
      <stop offset="100%" style="stop-color:#FCBF49"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1284" height="2778" fill="url(#splashGrad)"/>
  
  <!-- Decorative circles -->
  <circle cx="642" cy="1289" r="400" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="4"/>
  <circle cx="642" cy="1289" r="450" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <circle cx="642" cy="1289" r="500" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Calendar Icon Container - Larger -->
  <rect x="392" y="989" width="500" height="500" rx="80" fill="white" filter="url(#shadow)"/>

  <!-- Calendar Icon - Larger -->
  <rect x="442" y="1064" width="400" height="350" rx="30" fill="#F5F5F5"/>

  <!-- Calendar Header -->
  <rect x="442" y="1064" width="400" height="100" rx="30" fill="#E63946"/>
  <rect x="442" y="1134" width="400" height="30" fill="#E63946"/>

  <!-- Calendar Grid - Larger -->
  <g fill="#666">
    <rect x="470" y="1180" width="50" height="50" rx="8"/>
    <rect x="535" y="1180" width="50" height="50" rx="8"/>
    <rect x="600" y="1180" width="50" height="50" rx="8"/>
    <rect x="665" y="1180" width="50" height="50" rx="8"/>
    <rect x="730" y="1180" width="50" height="50" rx="8"/>

    <rect x="470" y="1245" width="50" height="50" rx="8"/>
    <rect x="535" y="1245" width="50" height="50" rx="8"/>
    <rect x="600" y="1245" width="50" height="50" rx="8" fill="#E63946"/>
    <rect x="665" y="1245" width="50" height="50" rx="8"/>
    <rect x="730" y="1245" width="50" height="50" rx="8"/>

    <rect x="470" y="1310" width="50" height="50" rx="8"/>
    <rect x="535" y="1310" width="50" height="50" rx="8"/>
    <rect x="600" y="1310" width="50" height="50" rx="8"/>
    <rect x="665" y="1310" width="50" height="50" rx="8"/>
    <rect x="730" y="1310" width="50" height="50" rx="8"/>
  </g>
  
  <!-- App Title -->
  <text x="642" y="1650" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">বাংলা ক্যালেন্ডার</text>
  
  <!-- Subtitle -->
  <text x="642" y="1720" font-family="Arial, sans-serif" font-size="36" fill="rgba(255,255,255,0.9)" text-anchor="middle">Bengali English Calendar</text>
  
  <!-- Decorative dots -->
  <circle cx="592" cy="1800" r="10" fill="#C1121F"/>
  <circle cx="642" cy="1800" r="10" fill="#D62828"/>
  <circle cx="692" cy="1800" r="10" fill="#F77F00"/>
  
  <!-- Version -->
  <text x="642" y="2600" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.7)" text-anchor="middle">Version 1.0.0</text>
</svg>
